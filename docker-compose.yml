services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - chroma_data:/app/chroma_data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/system/ping', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  chroma_data:
