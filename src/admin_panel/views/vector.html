<!-- ═══════════════════════════════════════════════════════
     VECTOR DB VIEW — collections, files, usage
     ═══════════════════════════════════════════════════════ -->
<div x-show="view === 'vector'">

  <!-- ── Semantic Search Panel ─────────────────────────────────────────────── -->
  <div class="card mb-6">
    <h3 class="text-sm font-semibold text-slate-300 mb-4 flex items-center gap-2">
      <svg class="w-4 h-4 text-slate-400"><use href="#ic-search"/></svg>
      Semantic Search
    </h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-3">
      <!-- App -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">App</label>
        <select title="apps" x-model="vectorSearch.appName"
                @change="vectorSearch.collection = ''; vectorSearch.done = false; vectorSearch.results = [];"
                class="input">
          <option value="">— select app —</option>
          <template x-for="app in vectorSearchApps" :key="app">
            <option :value="app" x-text="app"></option>
          </template>
        </select>
      </div>

      <!-- Collection -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">Collection</label>
        <select title="collection" x-model="vectorSearch.collection"
                :disabled="!vectorSearch.appName"
                class="input disabled:opacity-40 disabled:cursor-not-allowed">
          <option value="">— select collection —</option>
          <template x-for="col in vectorSearchFilteredCollections" :key="col">
            <option :value="col" x-text="col"></option>
          </template>
        </select>
      </div>

      <!-- Results count -->
      <div>
        <label class="block text-xs text-slate-500 mb-1">Results</label>
        <select title="results" x-model.number="vectorSearch.nResults" class="input">
          <option :value="3">3</option>
          <option :value="5">5</option>
          <option :value="10">10</option>
          <option :value="20">20</option>
        </select>
      </div>

      <!-- Search button -->
      <div class="flex items-end">
        <button title="search" @click="runVectorSearch()"
                :disabled="!vectorSearch.appName || !vectorSearch.collection || !vectorSearch.query.trim() || vectorSearch.loading"
                class="btn-primary w-full justify-center">
          <template x-if="!vectorSearch.loading">
            <span class="flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5"><use href="#ic-search"/></svg>
              Search
            </span>
          </template>
          <template x-if="vectorSearch.loading">
            <span class="flex items-center gap-2">
              <span class="spinner w-3.5 h-3.5 border-[1.5px]"></span>
              Searching…
            </span>
          </template>
        </button>
      </div>
    </div>

    <!-- Query input -->
    <input type="text"
           x-model="vectorSearch.query"
           @keydown.enter="runVectorSearch()"
           placeholder="Enter a semantic search query…"
           class="input" />

    <!-- Results -->
    <div x-show="vectorSearch.done" class="mt-5 space-y-3">
      <p x-show="vectorSearch.results.length === 0"
         class="text-sm text-slate-500 text-center py-4">
        No results found.
      </p>
      <template x-for="(result, idx) in vectorSearch.results" :key="idx">
        <div class="rounded-lg border border-slate-700/60 bg-slate-900/40 p-4">
          <div class="flex items-start justify-between gap-3 mb-2">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="text-xs font-mono bg-brand/15 text-brand-light ring-1 ring-brand/20 rounded px-2 py-0.5"
                    x-text="result.source"></span>
              <span class="text-xs font-mono ring-1 rounded px-2 py-0.5"
                    :class="scoreColor(result.score)"
                    x-text="result.score !== null ? 'score: ' + result.score : 'n/a'"></span>
            </div>
            <button @click="vectorSearch.expanded[idx] = !vectorSearch.expanded[idx]"
                    class="text-xs text-slate-500 hover:text-slate-300 shrink-0 transition-colors whitespace-nowrap">
              <span x-text="vectorSearch.expanded[idx] ? 'collapse' : 'expand'"></span>
            </button>
          </div>
          <p class="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap break-words"
             :class="vectorSearch.expanded[idx] ? '' : 'line-clamp-3'"
             x-text="result.text"></p>
        </div>
      </template>
    </div>
  </div>

  <!-- ── Toolbar ───────────────────────────────────────────────────────────── -->
  <div class="flex items-center justify-between mb-5">
    <p class="text-slate-400 text-sm">
      <span x-text="vectorCollections.length"></span> collection(s) &middot;
      <span x-text="vectorTotalChunks().toLocaleString()"></span> total chunks
    </p>
  </div>

  <!-- Loading spinner -->
  <div x-show="loading.vector" class="flex justify-center py-12">
    <span class="spinner text-slate-500 w-6 h-6 border-2"></span>
  </div>

  <!-- Empty state -->
  <div x-show="!loading.vector && vectorCollections.length === 0" class="card text-center py-14">
    <svg class="w-10 h-10 text-slate-600 mx-auto mb-3"><use href="#ic-db"/></svg>
    <p class="text-slate-400 font-medium">No collections found</p>
    <p class="text-slate-600 text-sm mt-1">Collections are created when apps upload documents via the RAG API.</p>
  </div>

  <!-- Collections table -->
  <div x-show="!loading.vector && vectorCollections.length > 0" class="card overflow-hidden p-0">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="border-b border-slate-700/60 bg-slate-900/40">
          <tr>
            <th class="th">App</th>
            <th class="th">Collection</th>
            <th class="th text-right">Chunks</th>
            <th class="th text-right">Actions</th>
          </tr>
        </thead>
          <template x-for="col in vectorCollections" :key="vectorKey(col)">
            <tbody>

                <!-- Collection row -->
                <tr class="border-b border-slate-700/40 hover:bg-slate-700/20 transition-colors">
                  <td class="td">
                    <span class="font-medium text-slate-100" x-text="col.app_name"></span>
                  </td>
                  <td class="td">
                    <div class="flex items-center gap-2">
                      <svg class="w-3.5 h-3.5 text-slate-500 shrink-0 transition-transform duration-150"
                           :class="vectorExpanded === vectorKey(col) ? 'rotate-90' : ''"
                           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                           stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                      </svg>
                      <span class="text-slate-200" x-text="col.collection_name"></span>
                    </div>
                  </td>
                  <td class="td text-right">
                    <span class="text-slate-300 font-mono text-xs"
                          x-text="(col.chunk_count || 0).toLocaleString()"></span>
                  </td>
                  <td class="td text-right">
                    <div class="flex items-center justify-end gap-2">
                      <button @click="toggleFiles(col)"
                              class="btn-sm bg-slate-700 hover:bg-slate-600 text-slate-300">
                        <svg class="w-3.5 h-3.5"><use href="#ic-log"/></svg>
                        <span x-text="vectorExpanded === vectorKey(col) ? 'Hide Files' : 'Files'"></span>
                      </button>
                      <button @click="openDeleteCollectionModal(col)"
                              class="btn-sm bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20">
                        <svg class="w-3.5 h-3.5"><use href="#ic-trash"/></svg>
                        Delete
                      </button>
                    </div>
                  </td>
                </tr>

                <!-- Expanded files row -->
                <tr x-show="vectorExpanded === vectorKey(col)"
                    class="border-b border-slate-700/40 bg-slate-900/30">
                  <td colspan="4" class="px-4 py-3">

                    <!-- Files loading -->
                    <div x-show="vectorFilesLoading[vectorKey(col)]"
                         class="flex items-center gap-2 text-slate-500 text-sm py-2">
                      <span class="spinner w-3.5 h-3.5 border-2"></span>
                      Loading files…
                    </div>

                    <!-- Files empty -->
                    <div x-show="!vectorFilesLoading[vectorKey(col)] && vectorFiles[vectorKey(col)] && vectorFiles[vectorKey(col)].length === 0"
                         class="text-slate-500 text-sm py-2 pl-1">
                      No files in this collection.
                    </div>

                    <!-- File list -->
                    <div x-show="!vectorFilesLoading[vectorKey(col)] && vectorFiles[vectorKey(col)] && vectorFiles[vectorKey(col)].length > 0"
                         class="space-y-1">
                      <template x-for="filename in (vectorFiles[vectorKey(col)] || [])" :key="filename">
                        <div class="flex items-center justify-between px-3 py-1.5 rounded-lg hover:bg-slate-700/30 group">
                          <div class="flex items-center gap-2 min-w-0">
                            <svg class="w-3.5 h-3.5 text-slate-500 shrink-0"><use href="#ic-log"/></svg>
                            <span class="text-sm text-slate-300 truncate" x-text="filename"></span>
                          </div>
                          <button @click="openDeleteFileModal(col, filename)"
                                  class="btn-sm bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 ml-3">
                            <svg class="w-3 h-3"><use href="#ic-trash"/></svg>
                            Delete
                          </button>
                        </div>
                      </template>
                    </div>

                  </td>
                </tr>

            </tbody>
          </template>
      </table>
    </div>
  </div>

</div>
