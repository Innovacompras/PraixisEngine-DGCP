<!-- ═══════════════════════════════════════════════════════
     AUDIT LOG VIEW — filterable, paginated event log
     ═══════════════════════════════════════════════════════ -->
<div x-show="view === 'audit'">

  <!-- Filter bar -->
  <div class="flex items-center gap-3 mb-5">
    <div class="flex-1 relative">
      <svg class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none">
        <use href="#ic-key"/>
      </svg>
      <input x-model="auditAppFilter"
             @input="onAuditFilterChange()"
             type="text"
             placeholder="Filter by app name…"
             class="input pl-9" />
    </div>
    <button @click="auditOffset = 0; auditEvents = []; loadAudit()" class="btn-ghost">
      <svg class="w-4 h-4"><use href="#ic-refresh"/></svg>
      Reload
    </button>
  </div>

  <!-- Loading initial batch -->
  <div x-show="loading.audit && auditEvents.length === 0" class="flex justify-center py-12">
    <span class="spinner text-slate-500 w-6 h-6 border-2"></span>
  </div>

  <!-- Empty state -->
  <div x-show="!loading.audit && auditEvents.length === 0 && auditLoaded" class="card text-center py-14">
    <svg class="w-10 h-10 text-slate-600 mx-auto mb-3"><use href="#ic-log"/></svg>
    <p class="text-slate-400 font-medium">No audit events</p>
    <p x-show="auditAppFilter" class="text-slate-600 text-sm mt-1">
      No events found for "<span x-text="auditAppFilter"></span>".
    </p>
    <p x-show="!auditAppFilter" class="text-slate-600 text-sm mt-1">
      Events will appear here as the system is used.
    </p>
  </div>

  <!-- Events table -->
  <div x-show="auditEvents.length > 0" class="card overflow-hidden p-0">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="border-b border-slate-700/60 bg-slate-900/40">
          <tr>
            <th class="th">Timestamp</th>
            <th class="th">Action</th>
            <th class="th">App</th>
            <th class="th">Details</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-700/40">
          <template x-for="(evt, idx) in auditEvents" :key="idx">
            <tr class="hover:bg-slate-700/20 transition-colors">
              <td class="td text-xs text-slate-400 whitespace-nowrap" x-text="formatDate(evt.timestamp)"></td>
              <td class="td whitespace-nowrap">
                <span class="badge" :class="actionBadge(evt.action)" x-text="evt.action"></span>
              </td>
              <td class="td text-xs text-slate-400" x-text="evt.app_name || '—'"></td>
              <td class="td text-xs text-slate-500 max-w-xs truncate" x-text="formatDetails(evt.details)"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <!-- Pagination footer -->
    <div class="border-t border-slate-700/60 px-4 py-3 flex items-center justify-between bg-slate-900/20">
      <span class="text-xs text-slate-500" x-text="auditEvents.length + ' events loaded'"></span>
      <button x-show="auditHasMore"
              @click="loadMoreAudit()"
              class="btn-ghost text-xs"
              :disabled="loading.audit">
        <span x-show="loading.audit" class="spinner w-3 h-3"></span>
        Load More
      </button>
      <span x-show="!auditHasMore" class="text-xs text-slate-600">All events loaded</span>
    </div>
  </div>

</div>
