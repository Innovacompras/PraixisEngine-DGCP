<!-- ═══════════════════════════════════════════════════════
     USAGE VIEW — per-app token and request stats
     ═══════════════════════════════════════════════════════ -->
<div x-show="view === 'usage'">

  <!-- Loading spinner -->
  <div x-show="loading.usage" class="flex justify-center py-12">
    <span class="spinner text-slate-500 w-6 h-6 border-2"></span>
  </div>

  <!-- Empty state -->
  <div x-show="!loading.usage && usage.length === 0" class="card text-center py-14">
    <svg class="w-10 h-10 text-slate-600 mx-auto mb-3"><use href="#ic-chart"/></svg>
    <p class="text-slate-400 font-medium">No usage recorded yet</p>
    <p class="text-slate-600 text-sm mt-1">Usage data appears here once apps start making requests.</p>
  </div>

  <div x-show="!loading.usage && usage.length > 0" class="space-y-5">

    <!-- Summary cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="card">
        <p class="text-xs text-slate-500 mb-1">Total Apps</p>
        <p class="text-2xl font-bold text-slate-100" x-text="usage.length"></p>
      </div>
      <div class="card">
        <p class="text-xs text-slate-500 mb-1">Total Requests</p>
        <p class="text-2xl font-bold text-slate-100" x-text="totalUsageRequests().toLocaleString()"></p>
      </div>
      <div class="card">
        <p class="text-xs text-slate-500 mb-1">Total Tokens</p>
        <p class="text-2xl font-bold text-slate-100" x-text="totalUsageTokens().toLocaleString()"></p>
      </div>
      <div class="card">
        <p class="text-xs text-slate-500 mb-1">Avg / Request</p>
        <p class="text-2xl font-bold text-slate-100"
           x-text="totalUsageRequests() > 0
             ? Math.round(totalUsageTokens() / totalUsageRequests()).toLocaleString()
             : '—'">
        </p>
      </div>
    </div>

    <!-- Per-app table -->
    <div class="card overflow-hidden p-0">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="border-b border-slate-700/60 bg-slate-900/40">
            <tr>
              <th class="th">App Name</th>
              <th class="th text-right">Requests</th>
              <th class="th text-right">Prompt Tokens</th>
              <th class="th text-right">Completion Tokens</th>
              <th class="th text-right">Total Tokens</th>
              <th class="th">Share</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-700/40">
            <template x-for="app in usage" :key="app.app_name">
              <tr class="hover:bg-slate-700/20 transition-colors">
                <td class="td font-medium text-slate-100" x-text="app.app_name"></td>
                <td class="td text-right" x-text="app.requests.toLocaleString()"></td>
                <td class="td text-right text-slate-400" x-text="app.prompt_tokens.toLocaleString()"></td>
                <td class="td text-right text-slate-400" x-text="app.completion_tokens.toLocaleString()"></td>
                <td class="td text-right font-semibold text-slate-200" x-text="app.total_tokens.toLocaleString()"></td>
                <td class="td w-36">
                  <div class="flex items-center gap-2">
                    <div class="flex-1 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                      <div class="h-full bg-brand rounded-full"
                           :style="'width: ' + (totalUsageTokens() > 0
                             ? Math.round(app.total_tokens / totalUsageTokens() * 100)
                             : 0) + '%'">
                      </div>
                    </div>
                    <span class="text-xs text-slate-500 w-9 text-right"
                          x-text="(totalUsageTokens() > 0
                            ? Math.round(app.total_tokens / totalUsageTokens() * 100)
                            : 0) + '%'">
                    </span>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
