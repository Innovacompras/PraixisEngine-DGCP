<!-- ═══════════════════════════════════════════════════════
     API KEYS VIEW — list, generate, revoke, wipe sessions
     ═══════════════════════════════════════════════════════ -->
<div x-show="view === 'keys'">

  <!-- Toolbar -->
  <div class="flex items-center justify-between mb-5">
    <p class="text-slate-400 text-sm" x-text="keys.length + ' key(s) registered'"></p>
    <button @click="openGenerateKeyModal()" class="btn-primary">
      <svg class="w-4 h-4"><use href="#ic-plus"/></svg>
      Generate Key
    </button>
  </div>

  <!-- Loading spinner -->
  <div x-show="loading.keys" class="flex justify-center py-12">
    <span class="spinner text-slate-500 w-6 h-6 border-2"></span>
  </div>

  <!-- Empty state -->
  <div x-show="!loading.keys && keys.length === 0" class="card text-center py-14">
    <svg class="w-10 h-10 text-slate-600 mx-auto mb-3"><use href="#ic-key"/></svg>
    <p class="text-slate-400 font-medium">No API keys yet</p>
    <p class="text-slate-600 text-sm mt-1">Generate a key to allow applications to connect.</p>
    <button @click="openGenerateKeyModal()" class="btn-primary mt-4 mx-auto">
      <svg class="w-4 h-4"><use href="#ic-plus"/></svg>
      Generate First Key
    </button>
  </div>

  <!-- Keys table -->
  <div x-show="!loading.keys && keys.length > 0" class="card overflow-hidden p-0">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="border-b border-slate-700/60 bg-slate-900/40">
          <tr>
            <th class="th">App Name</th>
            <th class="th">Key Preview</th>
            <th class="th">Created</th>
            <th class="th text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-700/40">
          <template x-for="key in keys" :key="key.key_hash">
            <tr class="hover:bg-slate-700/20 transition-colors">

              <td class="td">
                <span class="font-medium text-slate-100" x-text="key.app_name"></span>
              </td>

              <td class="td">
                <code class="text-xs bg-slate-700/50 text-slate-300 px-2 py-0.5 rounded font-mono"
                      x-text="key.key_preview">
                </code>
              </td>

              <td class="td text-slate-400 text-xs" x-text="formatDate(key.created_at)"></td>

              <td class="td text-right">
                <div class="flex items-center justify-end gap-2">
                  <button @click="openWipeSessionsModal(key)"
                          class="btn-sm bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 border border-amber-500/20"
                          title="Wipe all active sessions for this app">
                    <svg class="w-3.5 h-3.5"><use href="#ic-sessions"/></svg>
                    Wipe Sessions
                  </button>
                  <button @click="openRevokeModal(key)"
                          class="btn-sm bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20">
                    <svg class="w-3.5 h-3.5"><use href="#ic-trash"/></svg>
                    Revoke
                  </button>
                </div>
              </td>

            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>

</div>
