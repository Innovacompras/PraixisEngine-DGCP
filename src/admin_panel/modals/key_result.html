<!-- ═══════════════════════════════════════════════════════
     MODAL: New Key Result (one-time display with copy button)
     ═══════════════════════════════════════════════════════ -->
<div x-show="modal === 'newKeyResult'"
     x-transition:enter="transition ease-out duration-150"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     @keydown.escape.window="modal = null"
     class="modal-overlay">

  <div class="modal-box max-w-lg"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       @click.stop>

    <!-- Header -->
    <div class="px-6 pt-6 pb-4 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-green-500/15 flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-green-400"><use href="#ic-check"/></svg>
        </div>
        <div>
          <h3 class="font-semibold text-slate-100">Key Generated Successfully</h3>
          <p class="text-xs text-slate-400" x-text="'App: ' + (modalData.app_name || '')"></p>
        </div>
      </div>
    </div>

    <!-- Body -->
    <div class="px-6 py-5 space-y-4">

      <!-- One-time warning -->
      <div class="flex items-start gap-2.5 bg-amber-500/10 border border-amber-500/25 rounded-lg p-3.5">
        <svg class="w-4 h-4 text-amber-400 shrink-0 mt-0.5"><use href="#ic-warn"/></svg>
        <p class="text-sm text-amber-300">
          This key will <strong>not</strong> be shown again.
          Copy and store it safely before closing.
        </p>
      </div>

      <!-- Key display + copy -->
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">API Key</label>
        <div class="flex items-center gap-2">
          <code class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-sm font-mono text-green-400 break-all select-all"
                x-text="modalData.api_key">
          </code>
          <button @click="copyKey()"
                  class="btn bg-slate-700 hover:bg-slate-600 text-slate-200 shrink-0 self-stretch px-3"
                  title="Copy to clipboard">
            <svg class="w-4 h-4"><use href="#ic-copy"/></svg>
          </button>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div class="px-6 pb-6 flex justify-end">
      <button @click="modal = null" class="btn-primary">
        <svg class="w-4 h-4"><use href="#ic-check"/></svg>
        I've saved the key
      </button>
    </div>

  </div>
</div>
