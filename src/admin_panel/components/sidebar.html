<!-- ═══════════════════════════════════════════════════════
     SIDEBAR — brand, navigation, operator info
     ═══════════════════════════════════════════════════════ -->
<aside class="w-56 bg-[#070d1e] border-r border-cyan-500/10 flex flex-col shrink-0">

  <!-- Brand -->
  <div class="px-4 py-5 border-b border-cyan-500/10">
    <button @click="navigate('dashboard')"
            class="group flex items-center gap-3 w-full">
      <img src="/static/img/logo.png" alt="Praixis"
           class="w-8 h-8 object-contain shrink-0 opacity-90 group-hover:opacity-100 transition-opacity duration-200" />
      <div class="text-left">
        <p class="text-xs font-bold font-mono tracking-widest text-cyan-300 leading-none">PRAXIS</p>
        <p class="text-[10px] font-mono tracking-widest text-cyan-700 mt-0.5 leading-none">CTRL.TERMINAL</p>
      </div>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-2 py-4 overflow-y-auto space-y-0.5">
    <p class="text-[9px] font-mono tracking-[0.22em] text-cyan-800 px-3 mb-3">// MODULES</p>

    <button @click="navigate('dashboard')"
            :class="view === 'dashboard' ? 'nav-item active' : 'nav-item'">
      <svg class="w-4 h-4 shrink-0"><use href="#ic-grid"/></svg>
      Overview
    </button>

    <button @click="navigate('keys')"
            :class="view === 'keys' ? 'nav-item active' : 'nav-item'">
      <svg class="w-4 h-4 shrink-0"><use href="#ic-key"/></svg>
      API Keys
    </button>

    <button @click="navigate('usage')"
            :class="view === 'usage' ? 'nav-item active' : 'nav-item'">
      <svg class="w-4 h-4 shrink-0"><use href="#ic-chart"/></svg>
      Token Usage
    </button>

    <button @click="navigate('vector')"
            :class="view === 'vector' ? 'nav-item active' : 'nav-item'">
      <svg class="w-4 h-4 shrink-0"><use href="#ic-db"/></svg>
      Vector DB
    </button>

    <button @click="navigate('audit')"
            :class="view === 'audit' ? 'nav-item active' : 'nav-item'">
      <svg class="w-4 h-4 shrink-0"><use href="#ic-log"/></svg>
      Audit Log
    </button>
  </nav>

  <!-- Operator info + sign out -->
  <div class="px-2 py-3 border-t border-cyan-500/10">
    <div class="flex items-center gap-2.5 px-3 py-2 mb-1">
      <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 shrink-0"
            style="box-shadow: 0 0 6px rgba(6,182,212,0.8)"></span>
      <div class="min-w-0">
        <p class="text-xs font-mono text-cyan-300 truncate leading-none" x-text="loggedInUser"></p>
        <p class="text-[10px] font-mono tracking-widest text-cyan-800 mt-0.5">OPERATOR</p>
      </div>
    </div>
    <button @click="logout()" class="nav-item-danger w-full text-left">
      <svg class="w-4 h-4 shrink-0"><use href="#ic-logout"/></svg>
      Terminate Session
    </button>
  </div>

</aside>
