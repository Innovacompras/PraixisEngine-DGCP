<!-- ═══════════════════════════════════════════════════════
     TOAST NOTIFICATION — bottom-right, auto-dismisses after 3.5s
     ═══════════════════════════════════════════════════════ -->
<div x-show="toast.visible"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed bottom-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border text-sm font-medium"
     :class="toast.type === 'success'
       ? 'bg-slate-800 border-green-500/30 text-slate-100'
       : 'bg-slate-800 border-red-500/30 text-slate-100'">

  <svg class="w-4 h-4 shrink-0"
       :class="toast.type === 'success' ? 'text-green-400' : 'text-red-400'">
    <use :href="toast.type === 'success' ? '#ic-check' : '#ic-warn'"/>
  </svg>

  <span x-text="toast.message"></span>
</div>
